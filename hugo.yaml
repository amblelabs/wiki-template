# Hugo configuration file
title: My Site

enableGitInfo: true
enableRobotsTXT: true

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

outputs:
  home: [llms]

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - name: Docs
      pageRef: /docs
      weight: 1
    - name: About
      pageRef: /about
      weight: 2
    - name: Contact ↗
      url: "https://github.com/amblelabs"
      weight: 3
    - name: Search
      weight: 4
      params:
        type: search
    - name: GitHub
      weight: 5
      url: "https://github.com/amblelabs/hextra-starter-template"
      params:
        icon: github
    - name: Theme Toggle
      params:
        type: theme-toggle
        #label: true # optional, default is false
    - name: Language Switcher
      params:
        type: language-switch
        label: true # optional, default is false
        #icon: "globe-alt" # optional, default is "translate"

params:
  navbar:
    displayTitle: true
    displayLogo: true

  footer:
    displayCopyright: false
    displayPoweredBy: false

  editURL:
    enable: true
    base: "https://app.pagescms.org/amblelabs/ait-wiki/main/collection/wiki/edit/content"
    sep: "%2F"

  search:
    enable: true
    type: flexsearch

    flexsearch:
      # index page by: content | summary | heading | title
      index: content
  
  page:
    contextMenu:
      enable: true
      links:
        - name: Open in ChatGPT
          icon: chatgpt
          url: "https://chatgpt.com/?hints=search&q=I%27m+looking+at+this+documentation%3A+{url}%0AHelp+me+understand+how+to+use+it."
  
  imageZoom:
    enable: true

  externalLinkDecoration: true

  banner:
    key: 'announcement-xxx'
    message: |
      🎉 Welcome! [Hextra](https://github.com/hextra/hextra) is a static site generator that helps you build modern websites.
    
  # Display the last modification date
  displayUpdatedDate: true
  dateFormat: "January 2, 2006"
  # Display the author of the last modification
  displayUpdatedAuthor: true
  analytics:
    minGoogleAnalytics: true

caches:
  images:
    dir: :cacheDir/images

defaultContentLanguage: en
languages:
  en:
    languageName: English
    contentDir: content/en
    weight: 1
  #fr:
  #  languageName: Français
  #  weight: 2
  #ja:
  #  languageName: 日本語
  #  weight: 3
